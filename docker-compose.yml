# =============================================================================
# SpaceGame — Docker Compose Orchestration
# See: docs/governance/standard/docker-orchestration.md
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Jaeger — Trace storage, search, and dashboard UI
  # UI: http://localhost:16686
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    restart: unless-stopped
    ports:
      - "16686:16686" # Jaeger UI

  # ---------------------------------------------------------------------------
  # OTel Collector — Canonical OTLP ingestion endpoint
  # The game emits OTLP/HTTP here; collector forwards traces to Jaeger.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.88.0
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      jaeger:
        condition: service_started
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  # ---------------------------------------------------------------------------
  # Game — Build validation only (run natively on macOS for gameplay)
  # Use: docker compose --profile game build
  # Run: OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 ./build/SpaceGame
  # ---------------------------------------------------------------------------
  game:
    profiles: [ "game" ]
    build: .
    restart: "no"
    depends_on:
      otel-collector:
        condition: service_started
    environment:
      - DISPLAY=host.docker.internal:0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
